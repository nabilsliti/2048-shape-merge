name: shape_merge
description: '2048 Shape Merge — A shape fusion puzzle game.'
publish_to: 'none'
version: 1.0.0+12

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.3

  # Auth
  google_sign_in: ^6.2.2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # Audio
  audioplayers: ^6.1.0

  # Ads
  google_mobile_ads: ^5.3.0

  # IAP
  in_app_purchase: ^3.2.0

  # Storage
  shared_preferences: ^2.5.3

  # Notifications (P5 — streak reminders)
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.0

  # Misc
  uuid: ^4.5.1
  vector_math: ^2.1.4
  flutter_soloud: ^4.0.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1e1b4b"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#ffffff"
  color_dark: "#ffffff"
  image: "assets/icon/crestbit_logo.png"
  image_dark: "assets/icon/crestbit_logo.png"
  android_12:
    color: "#ffffff"
    image: "assets/icon/crestbit_logo.png"
